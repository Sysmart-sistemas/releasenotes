<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Release Notes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f172a;
  --sidebar: #020617;
  --card: #111827;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --border: #1f2937;
  --accent: #3b82f6;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: var(--sidebar);
  height: 100vh;
  padding: 20px;
  position: fixed;
  overflow-y: auto;
  border-right: 1px solid var(--border);
}

.logo {
  text-align: center;
  margin-bottom: 20px;
}

.logo img {
  max-width: 140px;
  background: white;
  padding: 8px;
  border-radius: 10px;
}

.search {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: var(--card);
  color: var(--text);
  margin-bottom: 15px;
}

.project-title {
  margin-top: 15px;
  font-weight: 600;
  font-size: 14px;
  color: white;
}

.sidebar a {
  display: block;
  padding: 6px;
  border-radius: 6px;
  color: var(--muted);
  text-decoration: none;
  margin: 3px 0;
}

.sidebar a:hover {
  background: var(--card);
  color: white;
}

.sidebar a.active {
  background: var(--accent);
  color: white;
}

/* CONTENT */
.content {
  margin-left: 260px;
  padding: 40px;
  max-width: 900px;
}

.project-header {
  margin-top: 40px;
  font-size: 22px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 5px;
}

.version {
  margin-bottom: 30px;
  padding: 20px;
  background: var(--card);
  border-radius: 14px;
  border: 1px solid var(--border);
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.badge {
  background: var(--accent);
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 12px;
}

.date {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 10px;
}

.category {
  margin-top: 15px;
  font-weight: 600;
}

.tag {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 12px;
  margin-right: 6px;
}

.new { background: #22c55e; }
.fix { background: #ef4444; }
.improve { background: #3b82f6; }

.top-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--accent);
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* MOBILE */
@media (max-width: 768px) {
  .sidebar {
    position: relative;
    width: 100%;
    height: auto;
  }

  .content {
    margin-left: 0;
    padding: 20px;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <img src="images/logo.png">
  </div>

  <input class="search" placeholder="Buscar..." oninput="filterVersions(this.value)">
  <div id="menu"></div>
</div>

<!-- CONTENT -->
<div class="content" id="content"></div>

<button class="top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
function label(type) {
  return {
    new: '✨ Novo',
    fix: '🐞 Fix',
    improve: '⚡ Melhoria'
  }[type] || type;
}

function render(data) {
  const content = document.getElementById('content');
  const menu = document.getElementById('menu');

  content.innerHTML = '';
  menu.innerHTML = '';

  data.forEach(project => {

    // SIDEBAR TITLE
    const title = document.createElement('div');
    title.className = 'project-title';
    title.innerText = project.project;
    menu.appendChild(title);

    // CONTENT HEADER
    const header = document.createElement('div');
    header.className = 'project-header';
    header.innerText = project.project;
    content.appendChild(header);

    project.releases.sort((a, b) =>
      b.version.localeCompare(a.version, undefined, { numeric: true })
    );

    project.releases.forEach((v, index) => {

      const id = project.project + '-' + v.version;

      // MENU LINK
      const link = document.createElement('a');
      link.href = '#' + id;
      link.innerText = 'v' + v.version;
      link.onclick = () => setActive(link);
      menu.appendChild(link);

      // CARD
      const div = document.createElement('div');
      div.className = 'version';
      div.id = id;

      let html = `
        <div class="header">
          <h2>Versão ${v.version}</h2>
          ${index === 0 ? '<span class="badge">Latest</span>' : ''}
        </div>
        <div class="date">${v.date || ''}</div>
      `;

      v.changes.forEach(cat => {
        html += `<div class="category">${cat.category}</div>`;
        cat.items.forEach(c => {
          html += `<p><span class="tag ${c.type}">${label(c.type)}</span> ${c.text}</p>`;
        });
      });

      div.innerHTML = html;
      content.appendChild(div);
    });

  });
}

function setActive(el) {
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  el.classList.add('active');
}

function filterVersions(query) {
  query = query.toLowerCase();
  document.querySelectorAll('.version').forEach(v => {
    v.style.display = v.innerText.toLowerCase().includes(query) ? 'block' : 'none';
  });
}

// LOAD JSON
fetch('releases.json')
  .then(res => res.json())
  .then(data => render(data))
  .catch(() => {
    document.getElementById('content').innerHTML =
      '<p>Erro ao carregar releases.json</p>';
  });
</script>

</body>
</html>
